<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Cadê a Água?</title>
    <link rel="icon" href="assets/peixe.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Link para o arquivo CSS -->
    <link rel="stylesheet" href="style/perfil.css">
</head>

<body>

<header class="navbar">
    <a href="hero.html" class="logo-link">
        <img src="assets/logo-cade-a-agua(sem%20fundo).png" alt="Logo Cadê a Água?" class="logo-img">
    </a>

    <nav>
        <a href="hero.html#noticias">Notícias</a>
        <a href="hero.html#vantagens">Vantagens</a>
        <a href="hero.html#avisos">Avisos</a>
        <a href="hero.html#footer">Sobre nós</a>
        <a href="notificacao.html">Dashboard</a>
        <a href="admin.html" data-admin-only>Admin</a>
    </nav>

    <div class="nav-right">
        <a href="hero.html" class="nav-pill" title="Voltar para a tela principal"><i class="fa-solid fa-house"></i></a>
        <a href="perfil.html" class="avatar-img" aria-label="Perfil"><i class="fa-solid fa-user"></i></a>
    </div>
</header>

<div class="main-container">

    <aside class="sidebar">
        <ul>
            <li class="active"><i class="fa-solid fa-user-gear" style="margin-right: 8px;"></i> Conta</li>
            <li onclick="irNotificacoes()"><i class="fa-solid fa-bell" style="margin-right: 8px;"></i> Notificação</li>
            <li><i class="fa-solid fa-headset" style="margin-right: 8px;"></i> Suporte</li>
        </ul>
    </aside>

    <section class="content">
        <div class="profile-card">

            <h2>Informações de usuário</h2>

            <div class="user-header">
                <img src="https://i.pravatar.cc/150?img=11" class="profile-img">
                <div>
                    <strong>Danilo Costa</strong>
                    <p>[Rua Professor Antônio Bezerra]</p>
                </div>
            </div>

            <form class="profile-form">

                <div class="row">
                    <div class="input-box">
                        <label>Nome*</label>
                        <input type="text" value="Danilo">
                    </div>
                    <div class="input-box">
                        <label>Sobrenome*</label>
                        <input type="text" value="Costa">
                    </div>
                </div>

                <label>Email*</label>
                <input type="email" value="Danilocosta@gmail.com">

                <label>Telefone*</label>
                <input type="text" value="(83) 998765432">

                <div class="form-footer">
                    <p>Deseja salvar?</p>
                    <button type="button" class="btn-save">Salvar</button>
                </div>

            </form>

            <hr>

            <div class="delete-section">
                <div>
                    <strong>Deletar Conta</strong>
                    <p>Todos os dados serão perdidos</p>
                </div>
                <button class="btn-delete">Deletar conta</button>
            </div>

            <button class="btn-logout" onclick="logout()">Sair da conta</button>

        </div>
    </section>

</div>

<script>
    document.addEventListener("DOMContentLoaded", ajustarLinksAdmin);

    function ajustarLinksAdmin() {
        if (localStorage.getItem("usuarioPerfil") !== "ADMIN") {
            document.querySelectorAll("[data-admin-only]").forEach((link) => {
                link.style.display = "none";
            });
        }
    }

    function logout() {
        localStorage.removeItem("usuarioId");
        localStorage.removeItem("usuarioEmail");
        localStorage.removeItem("usuarioNome");
        localStorage.removeItem("usuarioTelefone");
        localStorage.removeItem("usuarioPerfil");
        window.location.replace("login.html");
    }

    function irNotificacoes() {
        window.location.href = "notificacao.html";
    }
</script>

</body>
</html>
