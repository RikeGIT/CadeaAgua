<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cadê a Água?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid #318a94;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #318a94;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #318a94;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-voltar {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: #318a94;
            font-weight: bold;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .btn-voltar:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <br>
    <h1>Tela em Desenvolvimento</h1>
    <p>O dashboard do <strong>Cadê a Água?</strong> está sendo preparado para você, não fique brava keyla :(.</p>

    <a href="login.html" class="btn-voltar">← Sair e voltar ao Login</a>
</div>

</body>
</html>
