<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/peixe.png" type="image/x-icon">
    <title>Login - Cade a Agua?</title>
    <link rel="stylesheet" href="style/login.css">
</head>

<body>

<div class="wrapper">

    <div class="left">
        <div class="container">
            <h1>Cade a Agua?</h1>

            <div class="input-box">
                <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="Email Icon">
                <input type="email" id="email" placeholder="Usuario@gmail.com">
            </div>

            <div class="input-box">
                <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" alt="Password Icon">
                <input type="password" id="senha" placeholder="****************">
            </div>

            <div class="forgot">Esqueceu a senha?</div>

            <button class="btn-login" onclick="login()">Login</button>

            <div class="divider">ou</div>

            <div class="google-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google Icon">
                Realizar cadastro com o Google
            </div>

            <div class="register">
                Ainda nao tem uma conta?
                <span onclick="irCadastro()">Cadastre-se</span>
            </div>

            <div id="erro" class="feedback feedback-error" role="alert" aria-live="polite"></div>
        </div>
    </div>

    <div class="right"></div>

</div>

<script>
    async function login() {
        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value;
        const emailInput = document.getElementById("email");

        mostrarMensagem("");

        if (!email || !senha.trim()) {
            mostrarMensagem("Email e senha sao obrigatorios.");
            return;
        }

        if (!emailInput.checkValidity()) {
            mostrarMensagem("Digite um email valido.");
            return;
        }

        try {
            const response = await fetch("http://localhost:8080/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, senha })
            });

            const resposta = response.headers.get("content-type")?.includes("application/json")
                ? await response.json()
                : await response.text();

            if (response.ok) {
                localStorage.setItem("usuarioId", resposta.id);
                localStorage.setItem("usuarioEmail", resposta.email);
                localStorage.setItem("usuarioNome", resposta.nome || resposta.email.split("@")[0]);
                localStorage.setItem("usuarioTelefone", resposta.telefone || "");
                localStorage.setItem("usuarioPerfil", resposta.perfil || "USUARIO");
                window.location.href = resposta.perfil === "ADMIN" ? "admin.html" : "hero.html";
            } else {
                mostrarMensagem(resposta);
            }
        } catch (error) {
            mostrarMensagem("Erro ao conectar com o servidor.");
        }
    }

    function mostrarMensagem(mensagem) {
        const erroDiv = document.getElementById("erro");
        erroDiv.innerText = mensagem;
        erroDiv.classList.toggle("is-visible", Boolean(mensagem));
    }

    document.addEventListener("DOMContentLoaded", () => {
        const mensagem = localStorage.getItem("loginMensagem");
        if (mensagem) {
            mostrarMensagem(mensagem);
            localStorage.removeItem("loginMensagem");
        }
    });

    function irCadastro() {
        window.location.href = "cadastro.html";
    }
</script>

</body>
</html>
