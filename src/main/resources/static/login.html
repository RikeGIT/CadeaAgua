<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cadê a Água?</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #176471;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container estilo mobile */
        .container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
            text-align: center;
            color: white;
        }

        h1 {
            font-weight: 400;
            margin-bottom: 50px;
        }

        /* Inputs */
        .input-box {
            background: #ddd;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.2);
        }

        .input-box img {
            width: 20px;
            margin-right: 10px;
            opacity: 0.7;
        }

        .input-box input {
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            font-size: 14px;
        }

        /* Esqueceu senha */
        .forgot {
            text-align: right;
            font-size: 14px;
            margin-bottom: 35px;
            color: #e0f7fa;
        }

        /* Botão login */
        .btn-login {
            background-color: #2A8E9E;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            color: white;
            font-style: italic;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }

        /* Divider */
        .divider {
            margin: 30px 0;
            display: flex;
            align-items: center;
            color: white;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: white;
            margin: 0 10px;
        }

        /* Botão Google */
        .google-btn {
            background: #ddd;
            padding: 14px;
            border-radius: 8px;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.2);
        }

        .google-btn img {
            width: 20px;
        }

        /* Cadastro */
        .register {
            margin-top: 30px;
            font-size: 14px;
        }

        .register span {
            color: #AAECF7;
            font-weight: bold;
        }

        /* Erro */
        .error {
            color: #ffcccc;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Cadê a Água?</h1>

    <div class="input-box">
        <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png">
        <input type="email" id="email" placeholder="Usuário@gmail.com">
    </div>

    <div class="input-box">
        <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png">
        <input type="password" id="senha" placeholder="****************">
    </div>

    <div class="forgot">Esqueceu a senha?</div>

    <button class="btn-login" onclick="login()">Login</button>

    <div class="divider">ou</div>

    <div class="google-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
        Realizar cadastro com o Google
    </div>

    <div class="register">
        Ainda não tem uma conta? <span onclick="irCadastro()">Cadastre-se</span>
    </div>

    <div id="erro" class="error"></div>
</div>

<script>
    async function login() {
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;
        const erroDiv = document.getElementById("erro");

        erroDiv.innerText = "";

        try {
            const response = await fetch("http://localhost:8080/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, senha })
            });

            const mensagem = await response.text();

            if (response.ok) {
                window.location.href = "index.html";
            } else {
                erroDiv.innerText = mensagem;
            }

        } catch (error) {
            erroDiv.innerText = "Erro ao conectar com o servidor.";
        }
    }

    function irCadastro() {
        window.location.href = "cadastro.html";
    }
</script>

</body>
</html>
