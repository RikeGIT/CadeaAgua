<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema</title>
    <link rel="icon" href="assets/peixe.png" type="image/x-icon">
    <link rel="stylesheet" href="style/cadastro.css">
</head>
<body>
<div class="background-container">
    <main class="form-card">
        <header>
            <h1>Cadastre-se</h1>
            <p>Crie sua própria conta</p>
        </header>

        <form onsubmit="cadastrar(event)">
            <div class="input-group-row">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="sobrenome" placeholder="Sobrenome" required>
            </div>

            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="telefone" placeholder="Telefone (ex: 83998765432)" maxlength="20" required>
            <input type="password" id="senha" placeholder="Senha" required>

            <input type="text" id="rua" placeholder="Rua" required>

            <div class="input-group-row">
                <input type="text" id="bairro" placeholder="Bairro" required>
                <input type="text" id="cidade" placeholder="Cidade (ex: Patos)" required>
            </div>

            <input type="text" id="cep" placeholder="CEP (ex: 58700-000)" required>

            <button type="submit" class="btn-submit">Criar Conta</button>
        </form>

        <footer>
            <p>Já tem uma conta? <a href="#" onclick="irLogin()">Realizar login</a></p>
        </footer>
    </main>
</div>

<script>
    async function cadastrar(event) {
        event.preventDefault();

        const nome = document.getElementById("nome").value.trim();
        const sobrenome = document.getElementById("sobrenome").value.trim();

        const usuario = {
            nome: `${nome} ${sobrenome}`.trim(),
            email: document.getElementById("email").value,
            telefone: document.getElementById("telefone").value,
            senha: document.getElementById("senha").value,
            endereco: {
                rua: document.getElementById("rua").value,
                bairro: document.getElementById("bairro").value,
                cidade: document.getElementById("cidade").value,
                cep: document.getElementById("cep").value
            }
        };

        try {
            const response = await fetch("http://localhost:8080/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(usuario)
            });

            const resposta = response.headers.get("content-type")?.includes("application/json")
                ? await response.json()
                : await response.text();

            if (response.ok) {
                if (typeof resposta === "object") {
                    localStorage.setItem("usuarioId", resposta.id);
                    localStorage.setItem("usuarioEmail", resposta.email);
                    localStorage.setItem("usuarioNome", resposta.nome);
                    localStorage.setItem("usuarioTelefone", resposta.telefone);
                }

                alert("Cadastro realizado com sucesso!");
                window.location.href = "hero.html";
            } else {
                alert("Erro no cadastro: " + resposta);
            }
        } catch (error) {
            alert("Erro ao conectar com o servidor.");
        }
    }

    function irLogin() {
        window.location.href = "login.html";
    }
</script>
</body>
</html>
