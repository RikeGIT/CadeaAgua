<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Cadê a Água?</title>
    <link rel="stylesheet" href="perfil.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Cadê a Água?</div>
        <div class="nav-icons">
            <span class="icon">🏠</span>
            <span class="icon">🎧</span>
            <span class="icon">🔔</span>
            <div class="user-info" id="openSidebar">
                <img src="https://i.pravatar.cc/150?img=11" alt="Avatar" class="avatar">
                <span class="user-name">Olá, Danilo</span>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <button class="close-btn" id="closeSidebar">&times;</button>
                <ul>
                    <li class="active">⚙️ Configurações de Conta</li>
                    <li>🛡️ Notificação</li>
                    <li>🎧 Ajuda e Suporte</li>
                </ul>
            </div>
        </aside>

        <section class="content">
            <div class="profile-card">
                <h2>Informações de usuário</h2>
                
                <div class="user-header">
                    <img src="https://i.pravatar.cc/150?img=11" alt="Avatar" class="profile-img">
                    <div class="user-text">
                        <strong>Danilo Costa</strong>
                        <p>[Rua Professor Antônio Bezerra]</p>
                    </div>
                </div>

                <form class="profile-form">
                    <div class="row">
                        <div class="input-box">
                            <label>Nome*</label>
                            <input type="text" value="Danilo">
                        </div>
                        <div class="input-box">
                            <label>Sobrenome*</label>
                            <input type="text" value="Costa">
                        </div>
                    </div>

                    <label>Email ou número de celular*</label>
                    <input type="email" value="Danilocosta@gmail.com">

                    <label>Endereço*</label>
                    <input type="text" value="78-945612">

                    <div class="row">
                        <div class="input-box">
                            <label>Rua*</label>
                            <input type="text" value="João Anchieta">
                        </div>
                        <div class="input-box">
                            <label>Bairro*</label>
                            <input type="text" value="Belorizonte">
                        </div>
                    </div>

                    <label>Telefone*</label>
                    <input type="text" value="(83) 998765432">

                    <div class="form-footer">
                        <p>Deseja salvar as mudanças realizadas?</p>
                        <button type="button" class="btn-save">Salvar mudanças</button>
                    </div>
                </form>

                <hr>

                <div class="delete-section">
                    <div>
                        <strong>Deletar Conta</strong>
                        <p>Ao deletar sua conta todos os dados serão perdidos</p>
                    </div>
                    <button class="btn-delete">Deletar conta</button>
                </div>
            </div>
        </section>
    </div>

    <div class="tab-bar">
        <span>🏠</span>
        <span>📊</span>
        <span>🔔</span>
        <span id="tabGear">⚙️</span>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const openBtn = document.getElementById('openSidebar'); // Na foto do perfil
        const gearBtn = document.getElementById('tabGear');   // Na engrenagem de baixo
        const closeBtn = document.getElementById('closeSidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
        }

        openBtn.addEventListener('click', toggleSidebar);
        gearBtn.addEventListener('click', toggleSidebar);
        closeBtn.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
