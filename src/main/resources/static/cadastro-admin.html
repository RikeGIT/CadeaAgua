<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Admin - Sistema</title>
    <link rel="icon" href="assets/peixe.png" type="image/x-icon">
    <link rel="stylesheet" href="style/cadastro.css">
</head>
<body>
<div class="background-container">
    <main class="form-card">
        <header>
            <h1>Cadastro administrador</h1>
            <p>Crie uma conta com acesso ao painel admin</p>
        </header>

        <form onsubmit="cadastrarAdmin(event)" novalidate>
            <div class="input-group-row">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="sobrenome" placeholder="Sobrenome" required>
            </div>

            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="telefone" placeholder="Telefone (ex: 83998765432)" maxlength="20" required>
            <input type="password" id="senha" placeholder="Senha da conta" required>

            <select id="bairro" onchange="carregarLogradouros()" required>
                <option value="">Selecione o bairro</option>
            </select>

            <select id="rua" onchange="preencherCep()" required disabled>
                <option value="">Escolha um bairro primeiro</option>
            </select>

            <div class="input-group-row">
                <input type="text" id="cidade" value="Patos" readonly required>
                <input type="text" id="cep" placeholder="CEP" readonly required>
            </div>
            <input type="password" id="senhaAdministrador" placeholder="Senha administrativa" required>

            <button type="submit" class="btn-submit">Criar conta admin</button>
        </form>

        <div id="mensagem" class="feedback" role="alert" aria-live="polite"></div>

        <footer>
            <button type="button" class="secondary-action" onclick="irCadastroComum()">Criar conta comum</button>
            <p>Já tem uma conta? <a href="#" onclick="irLogin()">Realizar login</a></p>
        </footer>
    </main>
</div>

<script>
    const API_BASE = "http://localhost:8080";

    document.addEventListener("DOMContentLoaded", carregarBairros);

    async function carregarBairros() {
        const bairroSelect = document.getElementById("bairro");

        try {
            const response = await fetch(`${API_BASE}/api/localizacoes/bairros`);
            if (!response.ok) {
                throw new Error("Não foi possível carregar os bairros.");
            }

            const bairros = await response.json();
            bairros.forEach((bairro) => {
                const option = document.createElement("option");
                option.value = bairro.id;
                option.textContent = bairro.nome;
                option.dataset.nome = bairro.nome;
                bairroSelect.appendChild(option);
            });
        } catch (error) {
            mostrarMensagem("Não foi possível carregar os bairros de Patos.", "error");
        }
    }

    async function carregarLogradouros() {
        const bairroId = document.getElementById("bairro").value;
        const ruaSelect = document.getElementById("rua");
        const cepInput = document.getElementById("cep");

        ruaSelect.innerHTML = "";
        cepInput.value = "";

        if (!bairroId) {
            ruaSelect.disabled = true;
            ruaSelect.add(new Option("Escolha um bairro primeiro", ""));
            return;
        }

        ruaSelect.disabled = true;
        ruaSelect.add(new Option("Carregando ruas...", ""));

        try {
            const response = await fetch(`${API_BASE}/api/localizacoes/bairros/${bairroId}/logradouros`);
            if (!response.ok) {
                throw new Error("Não foi possível carregar as ruas.");
            }

            const logradouros = await response.json();
            ruaSelect.innerHTML = "";
            ruaSelect.add(new Option("Selecione a rua", ""));

            logradouros.forEach((logradouro) => {
                const option = new Option(logradouro.nome, logradouro.nome);
                option.dataset.cep = logradouro.cep || "";
                ruaSelect.add(option);
            });

            ruaSelect.disabled = logradouros.length === 0;
            if (logradouros.length === 0) {
                ruaSelect.innerHTML = "";
                ruaSelect.add(new Option("Nenhuma rua cadastrada para este bairro", ""));
            }
        } catch (error) {
            ruaSelect.innerHTML = "";
            ruaSelect.add(new Option("Erro ao carregar ruas", ""));
            mostrarMensagem("Não foi possível carregar as ruas do bairro.", "error");
        }
    }

    function preencherCep() {
        const ruaSelect = document.getElementById("rua");
        const option = ruaSelect.options[ruaSelect.selectedIndex];
        document.getElementById("cep").value = option?.dataset.cep || "";
    }

    async function cadastrarAdmin(event) {
        event.preventDefault();

        const nome = document.getElementById("nome").value.trim();
        const sobrenome = document.getElementById("sobrenome").value.trim();
        const senhaAdministrador = document.getElementById("senhaAdministrador").value;
        const bairroSelect = document.getElementById("bairro");
        const ruaSelect = document.getElementById("rua");
        const bairroNome = bairroSelect.options[bairroSelect.selectedIndex]?.dataset.nome || "";

        const usuario = {
            nome: `${nome} ${sobrenome}`.trim(),
            email: document.getElementById("email").value.trim(),
            telefone: document.getElementById("telefone").value.trim(),
            senha: document.getElementById("senha").value,
            endereco: {
                rua: ruaSelect.value.trim(),
                bairro: bairroNome.trim(),
                cidade: "Patos",
                cep: document.getElementById("cep").value.trim()
            }
        };

        mostrarMensagem("");

        if (!usuario.nome || !usuario.email || !usuario.telefone || !usuario.senha.trim()) {
            mostrarMensagem("Nome, email, telefone e senha são obrigatórios.", "error");
            return;
        }

        if (!document.getElementById("email").checkValidity()) {
            mostrarMensagem("Digite um email válido.", "error");
            return;
        }

        if (!usuario.endereco.rua || !usuario.endereco.bairro || !usuario.endereco.cidade || !usuario.endereco.cep) {
            mostrarMensagem("Endereço completo é obrigatório.", "error");
            return;
        }

        if (!senhaAdministrador.trim()) {
            mostrarMensagem("Senha administrativa obrigatória.", "error");
            return;
        }

        try {
            const response = await fetch("http://localhost:8080/auth/register-admin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ usuario, senhaAdministrador })
            });

            const resposta = response.headers.get("content-type")?.includes("application/json")
                ? await response.json()
                : await response.text();

            if (response.ok) {
                localStorage.setItem("usuarioId", resposta.id);
                localStorage.setItem("usuarioEmail", resposta.email);
                localStorage.setItem("usuarioNome", resposta.nome);
                localStorage.setItem("usuarioTelefone", resposta.telefone);
                localStorage.setItem("usuarioPerfil", resposta.perfil || "ADMIN");

                mostrarMensagem("Conta administradora criada com sucesso!", "success");
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 900);
            } else {
                mostrarMensagem(resposta, "error");
            }
        } catch (error) {
            mostrarMensagem("Erro ao conectar com o servidor.", "error");
        }
    }

    function mostrarMensagem(mensagem, tipo = "error") {
        const mensagemDiv = document.getElementById("mensagem");
        mensagemDiv.innerText = mensagem;
        mensagemDiv.className = `feedback feedback-${tipo}`;
        mensagemDiv.classList.toggle("is-visible", Boolean(mensagem));
    }

    function irCadastroComum() {
        window.location.href = "cadastro.html";
    }

    function irLogin() {
        window.location.href = "login.html";
    }
</script>
</body>
</html>
