<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Admin - Sistema</title>
    <link rel="icon" href="assets/peixe.png" type="image/x-icon">
    <link rel="stylesheet" href="style/cadastro.css">
</head>
<body>
<div class="background-container">
    <main class="form-card">
        <header>
            <h1>Cadastro administrador</h1>
            <p>Crie uma conta com acesso ao painel admin</p>
        </header>

        <form onsubmit="cadastrarAdmin(event)" novalidate>
            <div class="input-group-row">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="sobrenome" placeholder="Sobrenome" required>
            </div>

            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="telefone" placeholder="Telefone (ex: 83998765432)" maxlength="20" required>
            <input type="password" id="senha" placeholder="Senha da conta" required>

            <input type="text" id="rua" placeholder="Rua" required>

            <div class="input-group-row">
                <input type="text" id="bairro" placeholder="Bairro" required>
                <input type="text" id="cidade" placeholder="Cidade (ex: Patos)" required>
            </div>

            <input type="text" id="cep" placeholder="CEP (ex: 58700-000)" required>
            <input type="password" id="senhaAdministrador" placeholder="Senha administrativa" required>

            <button type="submit" class="btn-submit">Criar conta admin</button>
        </form>

        <div id="mensagem" class="feedback" role="alert" aria-live="polite"></div>

        <footer>
            <button type="button" class="secondary-action" onclick="irCadastroComum()">Criar conta comum</button>
            <p>Ja tem uma conta? <a href="#" onclick="irLogin()">Realizar login</a></p>
        </footer>
    </main>
</div>

<script>
    async function cadastrarAdmin(event) {
        event.preventDefault();

        const nome = document.getElementById("nome").value.trim();
        const sobrenome = document.getElementById("sobrenome").value.trim();
        const senhaAdministrador = document.getElementById("senhaAdministrador").value;

        const usuario = {
            nome: `${nome} ${sobrenome}`.trim(),
            email: document.getElementById("email").value.trim(),
            telefone: document.getElementById("telefone").value.trim(),
            senha: document.getElementById("senha").value,
            endereco: {
                rua: document.getElementById("rua").value.trim(),
                bairro: document.getElementById("bairro").value.trim(),
                cidade: document.getElementById("cidade").value.trim(),
                cep: document.getElementById("cep").value.trim()
            }
        };

        mostrarMensagem("");

        if (!usuario.nome || !usuario.email || !usuario.telefone || !usuario.senha.trim()) {
            mostrarMensagem("Nome, email, telefone e senha sao obrigatorios.", "error");
            return;
        }

        if (!document.getElementById("email").checkValidity()) {
            mostrarMensagem("Digite um email valido.", "error");
            return;
        }

        if (!usuario.endereco.rua || !usuario.endereco.bairro || !usuario.endereco.cidade || !usuario.endereco.cep) {
            mostrarMensagem("Endereco completo e obrigatorio.", "error");
            return;
        }

        if (!senhaAdministrador.trim()) {
            mostrarMensagem("Senha administrativa obrigatoria.", "error");
            return;
        }

        try {
            const response = await fetch("http://localhost:8080/auth/register-admin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ usuario, senhaAdministrador })
            });

            const resposta = response.headers.get("content-type")?.includes("application/json")
                ? await response.json()
                : await response.text();

            if (response.ok) {
                localStorage.setItem("usuarioId", resposta.id);
                localStorage.setItem("usuarioEmail", resposta.email);
                localStorage.setItem("usuarioNome", resposta.nome);
                localStorage.setItem("usuarioTelefone", resposta.telefone);
                localStorage.setItem("usuarioPerfil", resposta.perfil || "ADMIN");

                mostrarMensagem("Conta administradora criada com sucesso!", "success");
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 900);
            } else {
                mostrarMensagem(resposta, "error");
            }
        } catch (error) {
            mostrarMensagem("Erro ao conectar com o servidor.", "error");
        }
    }

    function mostrarMensagem(mensagem, tipo = "error") {
        const mensagemDiv = document.getElementById("mensagem");
        mensagemDiv.innerText = mensagem;
        mensagemDiv.className = `feedback feedback-${tipo}`;
        mensagemDiv.classList.toggle("is-visible", Boolean(mensagem));
    }

    function irCadastroComum() {
        window.location.href = "cadastro.html";
    }

    function irLogin() {
        window.location.href = "login.html";
    }
</script>
</body>
</html>
